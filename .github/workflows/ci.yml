# Hybrid PQ-OPAQUE Rust CI
# Author: Oleksandr Melnychenko

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test-linux:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - run: cargo test --workspace --tests --lib --locked
        working-directory: rust

  test-macos:
    name: Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - run: cargo test --workspace --tests --lib --locked
        working-directory: rust

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - run: cargo test --workspace --tests --lib --locked
        working-directory: rust

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - run: cargo fmt --check
        working-directory: rust
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
        working-directory: rust

  ffi-smoke:
    name: FFI Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - name: Build native FFI library
        working-directory: rust
        run: cargo build --package opaque-ffi --locked
      - name: Verify public header surface
        run: |
          test -f rust/include/opaque_api.h
          test -f rust/include/opaque_agent.h
          test -f rust/include/opaque_relay.h
          test -f rust/include/module.modulemap
          grep -q 'umbrella header "opaque_api.h"' rust/include/module.modulemap
      - name: Compile and run C smoke test
        run: |
          cc tests/c/ffi_smoke.c -I rust/include -L rust/target/debug -Wl,-rpath,"$PWD/rust/target/debug" -lopaque_ffi -o /tmp/ffi_smoke
          /tmp/ffi_smoke

  swift-package:
    name: Swift Package
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build Swift package
        run: swift build

  security-docs:
    name: Security Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check required security files
        run: |
          errors=0
          for f in SECURITY.md LICENSE CONTRIBUTING.md \
                   docs/isms/INFORMATION_SECURITY_POLICY.md \
                   docs/isms/RISK_ASSESSMENT_REGISTER.md \
                   docs/security-review/THREAT_MODEL.md; do
            if [ -f "$f" ]; then
              echo "✓ Found: $f"
            else
              echo "✗ Missing: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo ""
            echo "ERROR: $errors required security file(s) missing"
            exit 1
          fi
